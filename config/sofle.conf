# Sofle RGB ZMK Configuration
# Migrated from QMK keyhive_via

# ---- Display (OLED SSD1306 128x32) ----
CONFIG_ZMK_DISPLAY=y

# ---- Encoders ----
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ---- RGB Underglow (WS2812 - 37 LEDs per half) ----
CONFIG_ZMK_RGB_UNDERGLOW=y

# Encender RGB al bootear (por defecto ZMK arranca apagado)
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# Desactivar auto-off por idle mientras debuggeamos (volver a y después)


# Colores de arranque
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20

# Keyhive no tiene MOSFET VCC conmutable: no togglar ext-power
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y


# ---- Power Management ----
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
